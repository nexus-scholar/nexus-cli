version: 4
project: image_texture_slr

# ===========================================================================
# v4 DESIGN PRINCIPLES (Texture & Image Processing, 2021–2026)
# ---------------------------------------------------------------------------
# 1. Total OR terms per query strictly <= 6 (well below OpenAlex 10-term cap)
# 2. Separate "classical" texture/image-processing track from deep-learning track
# 3. Explicit 2021+ filter to focus on recent contributions
# 4. No include_any / exclude_any — screener heuristics handle finer logic
# 5. Schema matches existing Pydantic Query BaseModel used in tomatomap_slr
# ===========================================================================

searches:

  # =========================================================================
  # Track T1: Core texture-analysis methods in image processing
  # =========================================================================

  - id: TX_CORE01
    label: TX_CORE01
    query: >
      (texture OR "texture analysis")
      AND ("image processing" OR "image analysis")
    year_from: 2023
    limit: 100
    metadata:
      theme: core_texture_analysis
      priority: high
    include_title_abstract: >
      Include if the main contribution is a texture-based method or framework in
      image processing or image analysis, such as new texture descriptors,
      pipelines, or surveys explicitly focused on texture (e.g., statistical,
      structural, or model-based texture representations).
    exclude_title_abstract: >
      Exclude if “texture” is only used descriptively (e.g., “texture of the
      surface”) without any explicit texture-analysis method, or if texture is a
      minor side feature in a generic deep model with no dedicated texture module
      or analysis.

  - id: TX_FEAT01
    label: TX_FEAT01
    query: >
      ("Gabor filter" OR "Haralick" OR "co-occurrence matrix" OR "LBP" OR "local binary pattern")
      AND ("image processing" OR "image analysis")
    year_from: 2023
    limit: 100
    metadata:
      theme: classical_texture_features
      priority: high
    include_title_abstract: >
      Include if the study proposes, modifies, or systematically evaluates
      classical texture descriptors such as Gabor filters, Haralick features,
      gray-level co-occurrence matrices, or local binary patterns within image
      processing pipelines (e.g., classification, segmentation, detection).
    exclude_title_abstract: >
      Exclude if the classical descriptor is only used as a trivial baseline
      without analysis, or appears only in the related work without being part of
      the proposed method or experimental evaluation.

  - id: TX_MULTI01
    label: TX_MULTI01
    query: >
      (texture OR "texture analysis")
      AND ("multiresolution" OR "multiscale" OR "wavelet" OR "shearlet")
    year_from: 2023
    limit: 100
    metadata:
      theme: multiscale_texture
      priority: medium
    include_title_abstract: >
      Include if the paper develops or evaluates multiresolution or multiscale
      approaches for texture analysis (e.g., wavelet-based, shearlet-based, or
      other scale-space models) in image processing tasks.
    exclude_title_abstract: >
      Exclude if multiscale or wavelet methods are used for general image
      compression or denoising without explicit focus on texture modeling or
      texture-based decision making.

  # =========================================================================
  # Track T2: Texture-aware deep learning and representation learning
  # =========================================================================

  - id: TX_DL01
    label: TX_DL01
    query: >
      (texture OR "texture features")
      AND ("convolutional neural network" OR CNN OR "deep learning")
    year_from: 2023
    limit: 100
    metadata:
      theme: texture_aware_deep_learning
      priority: high
    include_title_abstract: >
      Include if the study explicitly incorporates texture modeling into a deep
      learning architecture (e.g., texture-aware CNN layers, texture pooling,
      texture attention), or analyzes how deep networks capture and use texture
      features in image tasks.
    exclude_title_abstract: >
      Exclude if deep learning is used with no explicit reference to texture
      modeling, or if “texture” is mentioned only as a qualitative description
      of images without methodological impact.

  - id: TX_SSL01
    label: TX_SSL01
    query: >
      ("self-supervised" OR "contrastive learning" OR "representation learning")
      AND (texture OR "image texture")
    year_from: 2023
    limit: 100
    metadata:
      theme: texture_representation_learning
      priority: medium
    include_title_abstract: >
      Include if the paper uses self-supervised, contrastive, or general
      representation learning methods explicitly to learn texture-sensitive
      image features, or evaluates how such representations capture texture for
      downstream tasks.
    exclude_title_abstract: >
      Exclude if the representation learning method is completely generic with no
      focus on texture, or if texture is only mentioned among many visual
      properties without dedicated analysis, experiments, or ablations.

  - id: TX_VIT01
    label: TX_VIT01
    query: >
      (texture OR "texture analysis")
      AND ("vision transformer" OR "ViT" OR "transformer-based")
    year_from: 2023
    limit: 100
    metadata:
      theme: texture_transformers
      priority: medium
    include_title_abstract: >
      Include if the work studies or designs transformer-based or ViT-style
      architectures for texture modeling or texture-sensitive image tasks (e.g.,
      fine-grained recognition driven by texture cues).
    exclude_title_abstract: >
      Exclude if transformers are used for general image classification or
      segmentation without any dedicated focus on texture modeling, texture
      descriptors, or texture-aware analysis.

  # =========================================================================
  # Track T3: Texture in image segmentation, classification, and detection
  # =========================================================================

  - id: TX_SEG01
    label: TX_SEG01
    query: >
      (texture OR "texture features")
      AND segmentation
    year_from: 2023
    limit: 100
    metadata:
      theme: texture_segmentation
      priority: high
    include_title_abstract: >
      Include if texture information is central to the segmentation method
      (e.g., texture-based region growing, Markov random fields with texture
      features, CNNs with explicit texture channels) or if the paper analyzes
      texture cues for segmentation quality.
    exclude_title_abstract: >
      Exclude if segmentation is done purely by shape or intensity with no use
      of texture descriptors or if the word “texture” only appears in qualitative
      visual descriptions of results.

  - id: TX_CLS01
    label: TX_CLS01
    query: >
      (texture OR "texture classification")
      AND (classification OR recognition)
    year_from: 2023
    limit: 100
    metadata:
      theme: texture_classification
      priority: medium
    include_title_abstract: >
      Include if the main task is texture classification or recognition, or if
      texture-based features are the primary input to a classifier for image or
      region-level decisions.
    exclude_title_abstract: >
      Exclude if classification uses generic deep features with no explicit link
      to texture, or if texture classification is a minor side experiment without
      methodological contribution.

  - id: TX_DET01
    label: TX_DET01
    query: >
      (texture OR "surface pattern")
      AND (detection OR "defect detection" OR "anomaly detection")
    year_from: 2023
    limit: 100
    metadata:
      theme: texture_based_detection
      priority: medium
    include_title_abstract: >
      Include if detection or anomaly/defect detection is explicitly based on
      texture or surface pattern analysis (e.g., industrial surface inspection,
      fabric defects, material textures), using either classical or deep texture
      descriptors.
    exclude_title_abstract: >
      Exclude if detection focuses solely on object shape, keypoints, or generic
      semantic features with no explicit modeling of texture or surface patterns.

  # =========================================================================
  # Track T4: Application-focused texture and image-processing contributions
  # =========================================================================

  - id: TX_MED01
    label: TX_MED01
    query: >
      (texture OR "radiomic texture" OR "texture features")
      AND (medical OR radiology OR "medical imaging")
    year_from: 2023
    limit: 100
    metadata:
      theme: medical_texture_analysis
      priority: medium
    include_title_abstract: >
      Include if texture-based image processing or radiomic texture features are
      a central part of the medical imaging method (e.g., tumor characterization,
      tissue classification, prognosis models using texture).
    exclude_title_abstract: >
      Exclude if medical imaging uses only generic CNN embeddings, shape, or
      intensity statistics without explicit discussion or use of texture/radiomic
      texture features.

  - id: TX_IND01
    label: TX_IND01
    query: >
      (texture OR "surface texture")
      AND ("industrial inspection" OR manufacturing OR "quality control")
    year_from: 2023
    limit: 100
    metadata:
      theme: industrial_texture_inspection
      priority: low
    include_title_abstract: >
      Include if image processing for industrial inspection or quality control
      relies on texture or surface texture analysis (e.g., detecting scratches,
      roughness, or regular pattern defects).
    exclude_title_abstract: >
      Exclude if inspection is primarily geometric or dimensional with no texture
      features, or if images are only used for simple thresholding without any
      texture modeling.

  - id: TX_REMOT01
    label: TX_REMOT01
    query: >
      (texture OR "texture features")
      AND ("remote sensing" OR "satellite image" OR "SAR image")
    year_from: 2023
    limit: 100
    metadata:
      theme: remote_sensing_texture
      priority: low
    include_title_abstract: >
      Include if texture analysis is central to remote sensing or SAR image
      processing (e.g., land-use classification by texture, sea-ice texture
      modeling, speckle texture descriptors).
    exclude_title_abstract: >
      Exclude if remote sensing uses only spectral indices or generic deep
      features with no explicit role for texture descriptors or texture analysis.
